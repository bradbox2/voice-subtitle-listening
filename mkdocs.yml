site_name: Voice Subtitle Listening Practice
site_description: "A GPLv3 fork of Voice for subtitle-based listening practice, offline audiobook playback, and local SRT workflows."
site_author: bradbox2
site_url: https://bradbox2.github.io/voice-subtitle-listening/

repo_url: https://github.com/bradbox2/voice-subtitle-listening
repo_name: "bradbox2/voice-subtitle-listening"

nav:
  - Home: index.md
  - Organizing Audiobooks: organizing.md
  - Privacy Policy: privacy-policy.md
  - License: license.md
  - Contributing: contributing.md
  - About: about.md
  - Development: development.md
  - Architecture: architecture.md
  - FAQ: faq.md

theme:
  name: material
  logo: logo.png
  features:
    - navigation.instant
  palette:
    - scheme: default
      primary: white
      accent: indigo

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

plugins:
  - redirects:
      redirect_maps:
        'privacy_policy.md': 'privacy-policy.md'
        'privacy.md': 'privacy-policy.md'

copyright: <a href="https://github.com/bradbox2/voice-subtitle-listening">bradbox2/voice-subtitle-listening</a>
